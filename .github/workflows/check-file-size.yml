name: Check file size

on:
  pull_request:
    branches: [main]
  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  check-file-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Check for oversized files
        run: |
          # 10MB limit for HF Spaces compatibility
          LIMIT=10485760

          # Model file extensions that are allowed to exceed the limit
          ALLOWED_EXTENSIONS=".gguf"

          found_large=false
          while IFS= read -r -d '' file; do
            size=$(stat --format='%s' "$file")
            if [ "$size" -gt "$LIMIT" ]; then
              is_allowed=false
              for ext in $ALLOWED_EXTENSIONS; do
                if [[ "$file" == *"$ext" ]]; then
                  is_allowed=true
                  break
                fi
              done

              if [ "$is_allowed" = false ]; then
                echo "::error::File '$file' ($(numfmt --to=iec $size)) exceeds the ${LIMIT} byte limit"
                found_large=true
              else
                echo "::notice::File '$file' ($(numfmt --to=iec $size)) is a model file - OK"
              fi
            fi
          done < <(find . -not -path './.git/*' -type f -print0)

          if [ "$found_large" = true ]; then
            echo "::error::Large files detected. Reduce their size or add the extension to the allowed list."
            exit 1
          fi
          echo "All files within size limits."
