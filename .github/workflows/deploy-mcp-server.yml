name: Deploy MCP Server

on:
  push:
    branches: [main]
    paths:
      - "frontal_engine_mcp_server.py"
      - "frontal_engine.mcp.json"
      - "neuroquantum_layered.py"
      - "qbnn_layered.py"
      - "neuroq_tokenizer.model"
      - "neuroq_tokenizer.vocab"
      - "docker/Dockerfile.mcp"
      - "requirements.txt"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mcp-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push MCP Server Docker image
        id: docker-build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.mcp
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-mcp-server:
    needs: build-and-push
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/tapiocatakeshi/qubit/mcp-server:${{ github.sha }}

    steps:
      - name: Test MCP Server startup
        timeout-minutes: 2
        run: |
          # MCPサーバーが起動できるかテスト（タイムアウト後は成功と見なす）
          timeout 5 python -u frontal_engine_mcp_server.py || true
          echo "MCP Server image created successfully"
