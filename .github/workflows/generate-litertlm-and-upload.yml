name: Generate LiteRT-LM bundles and upload to HF

on:
  workflow_dispatch:
    inputs:
      sizes:
        description: 'Space-separated sizes (small medium large xlarge)'
        required: false
        default: 'small medium large xlarge'
      repo_template:
        description: 'HF repo id template (use {size})'
        required: false
        default: 'tapiocaTakeshi/qubit-neuroquantum-{size}-litertlm'
      skip_upload:
        description: 'If "true", only generate; do not push to HF'
        required: false
        default: 'false'
  push:
    branches:
      - claude/literlm-file-hf-upload-OJ0DW
    paths:
      - 'generate_litertlm_models.py'
      - 'upload_litertlm_to_huggingface.py'
      - '.github/workflows/generate-litertlm-and-upload.yml'

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout (with LFS for tokenizer)
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "torch>=2.4.0" --index-url https://download.pytorch.org/whl/cpu
          pip install "numpy>=1.24.0" "sentencepiece>=0.1.99" "huggingface-hub>=0.30.0,<1.0"

      - name: Resolve sizes
        id: sizes
        run: |
          sizes="${{ github.event.inputs.sizes }}"
          if [ -z "$sizes" ]; then
            sizes="small medium large xlarge"
          fi
          echo "sizes=$sizes" >> "$GITHUB_OUTPUT"
          echo "Resolved sizes: $sizes"

      - name: Generate .litertlm bundles
        run: |
          python generate_litertlm_models.py \
            --output-dir litertlm_models \
            --sizes ${{ steps.sizes.outputs.sizes }} \
            --repo-id-template "${{ github.event.inputs.repo_template || 'tapiocaTakeshi/qubit-neuroquantum-{size}-litertlm' }}"

      - name: List generated files
        run: |
          ls -lh litertlm_models/
          echo "---"
          cat litertlm_models/manifest.json

      - name: Upload manifest as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: litertlm-bundles-${{ github.run_number }}
          path: |
            litertlm_models/*.litertlm
            litertlm_models/manifest.json
          retention-days: 14

      - name: Upload to Hugging Face
        if: ${{ github.event.inputs.skip_upload != 'true' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is not set."
            exit 1
          fi
          python upload_litertlm_to_huggingface.py \
            --litertlm-dir litertlm_models \
            --repo-id-template "${{ github.event.inputs.repo_template || 'tapiocaTakeshi/qubit-neuroquantum-{size}-litertlm' }}"
