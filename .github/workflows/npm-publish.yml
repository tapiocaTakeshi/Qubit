name: npm publish - gemma-qbnn-frontal

on:
  push:
    tags:
      - "gemma-qbnn-frontal@*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to publish (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Determine version tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="gemma-qbnn-frontal@${{ github.event.inputs.version }}"
            VERSION="${{ github.event.inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#*@}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Handle manual release tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # Check if tag exists, if not create it
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Creating tag $TAG"
            git tag "$TAG"
            git push origin "$TAG"
          else
            echo "Tag $TAG already exists"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        working-directory: gemma-qbnn-frontal
        run: npm install

      - name: Build
        working-directory: gemma-qbnn-frontal
        run: npm run build

      - name: Run tests (if available)
        working-directory: gemma-qbnn-frontal
        run: npm test --if-present
        continue-on-error: true

      - name: Publish to npm
        working-directory: gemma-qbnn-frontal
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          release_name: gemma-qbnn-frontal ${{ steps.version.outputs.tag }}
          body: |
            ## Release Information

            This release publishes **gemma-qbnn-frontal** to npm registry.

            ### Installation
            ```bash
            npm install gemma-qbnn-frontal@${{ steps.version.outputs.version }}
            ```

            ### Features
            - Gemma + QBNN ハイブリッド推論システム
            - Language understanding, issue discovery, quantum judgment
            - Dynamic response generation (no templates)
            - APQB quantum-based decision making

            ### Documentation
            - [README](https://github.com/${{ github.repository }}/blob/${{ steps.version.outputs.tag }}/gemma-qbnn-frontal/README.md)
            - [Package on npm](https://www.npmjs.com/package/gemma-qbnn-frontal)

            For more details, see the [full commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          draft: false
          prerelease: false

      - name: Post Success Message
        if: success()
        run: |
          echo "✓ Successfully published gemma-qbnn-frontal to npm"
          echo "Package: https://www.npmjs.com/package/gemma-qbnn-frontal"
          echo "Release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}"
