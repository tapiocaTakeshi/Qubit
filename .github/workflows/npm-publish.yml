name: npm publish - gemma-qbnn-frontal

on:
  push:
    tags:
      - "gemma-qbnn-frontal@*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        working-directory: gemma-qbnn-frontal
        run: npm install

      - name: Build
        working-directory: gemma-qbnn-frontal
        run: npm run build

      - name: Run tests (if available)
        working-directory: gemma-qbnn-frontal
        run: npm test --if-present
        continue-on-error: true

      - name: Publish to npm
        working-directory: gemma-qbnn-frontal
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: gemma-qbnn-frontal ${{ github.ref_name }}
          body: |
            ## Release Information

            This release publishes **gemma-qbnn-frontal** to npm registry.

            ### Installation
            ```bash
            npm install gemma-qbnn-frontal@${{ github.ref_name }}
            ```

            ### Features
            - Gemma + QBNN ハイブリッド推論システム
            - Language understanding, issue discovery, quantum judgment
            - Dynamic response generation (no templates)
            - APQB quantum-based decision making

            ### Documentation
            - [README](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/gemma-qbnn-frontal/README.md)
            - [Package on npm](https://www.npmjs.com/package/gemma-qbnn-frontal)

            For more details, see the [full commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          draft: false
          prerelease: false

      - name: Post Success Message
        if: success()
        run: |
          echo "✓ Successfully published gemma-qbnn-frontal to npm"
          echo "Package: https://www.npmjs.com/package/gemma-qbnn-frontal"
          echo "Release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
