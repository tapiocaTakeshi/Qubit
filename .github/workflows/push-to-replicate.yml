name: Push to Replicate

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - "handler.py"
      - "*.py"
  workflow_dispatch:

env:
  REPLICATE_MODEL: tapiocatakeshi/qubit_ai

jobs:
  push_to_replicate:
    name: Push to Replicate
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          docker-images: false

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cog
        uses: replicate/setup-cog@v2
        with:
          token: ${{ secrets.REPLICATE_CLI_AUTH_TOKEN }}

      - name: Push to Replicate
        run: |
          for attempt in 1 2 3 4; do
            echo "Attempt $attempt of 4..."
            if cog push r8.im/${{ env.REPLICATE_MODEL }}; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            if [ "$attempt" -lt 4 ]; then
              sleep_time=$((2 ** attempt * 2))
              echo "Push failed, retrying in ${sleep_time}s..."
              sleep "$sleep_time"
            fi
          done
          echo "Push failed after 4 attempts"
          exit 1
