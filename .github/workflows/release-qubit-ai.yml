name: Release qubit_ai to npm

on:
  push:
    branches: [main]
    paths:
      - "npm/**"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip the bot's own version-bump commit to avoid infinite loops
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' &&
       !startsWith(github.event.head_commit.message, 'chore(release):'))
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: npm/package-lock.json

      - name: Install dependencies
        working-directory: npm
        run: npm ci

      - name: Run tests
        working-directory: npm
        run: npm test

      # Auto-detect bump type from conventional commits since the last tag
      - name: Detect bump type from commits
        if: github.event_name == 'push'
        id: auto-bump
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 --match "qubit_ai@*" 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "${LAST_TAG}..HEAD")
          fi

          BUMP="patch"
          if echo "$COMMITS" | grep -qE "(^feat(\(.+\))?!:|^fix(\(.+\))?!:|BREAKING CHANGE)"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Detected bump: $BUMP"

      - name: Resolve bump type
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "bump=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          else
            echo "bump=${{ steps.auto-bump.outputs.bump }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: version
        working-directory: npm
        run: |
          NEW_VERSION=$(npm version "${{ steps.resolve.outputs.bump }}" --no-git-tag-version)
          echo "version=${NEW_VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "New version: ${NEW_VERSION#v}"

      - name: Build
        working-directory: npm
        run: npm run build

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit, tag and push
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git add npm/package.json npm/package-lock.json
          git commit -m "chore(release): qubit_ai@${VERSION}"
          git tag "qubit_ai@${VERSION}"
          git push origin main
          git push origin "qubit_ai@${VERSION}"

      - name: Publish to npm
        working-directory: npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const bump = '${{ steps.resolve.outputs.bump }}';
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `qubit_ai@${version}`,
              name: `qubit_ai v${version}`,
              body: [
                `## qubit_ai v${version}`,
                '',
                `**Bump type:** ${bump}`,
                `**npm:** https://www.npmjs.com/package/qubit_ai/v/${version}`,
                '',
                '### Install',
                '```sh',
                `npm install qubit_ai@${version}`,
                '```',
              ].join('\n'),
              draft: false,
              prerelease: false,
            });
