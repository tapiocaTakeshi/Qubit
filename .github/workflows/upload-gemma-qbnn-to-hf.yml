name: Upload Gemma-QBNN to Hugging Face

on:
  workflow_run:
    workflows: ["Generate Gemma-QBNN GGUF"]
    types: [completed]
    branches:
      - 'claude/gemma4-qbnn-layer-**'
  workflow_dispatch:
    inputs:
      artifact_name:
        description: "Artifact name to download"
        required: false
        default: "gemma-qbnn-gguf-Q4_K_M"
      hf_repo:
        description: "Hugging Face repo (default: tapiocatakeshi/Qubit-Gemma-QBNN)"
        required: false
        default: "tapiocatakeshi/Qubit-Gemma-QBNN"

jobs:
  upload-to-hf:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install huggingface-hub

      - name: 📥 Download GGUF artifacts
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: gemma-qbnn-gguf-Q4_K_M
          path: gguf_artifacts

      - name: 🔍 Find and list GGUF files
        run: |
          echo "=== GGUF Files Found ==="
          find . -name "*.gguf" -type f
          echo ""
          echo "Total size:"
          du -sh gguf_artifacts/

      - name: 🔐 Login to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python << 'EOF'
          from huggingface_hub import login
          import os

          hf_token = os.getenv("HF_TOKEN")
          if not hf_token:
              raise ValueError("HF_TOKEN not set")
          login(token=hf_token)
          print("✓ Logged in to Hugging Face")
          EOF

      - name: 📤 Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python << 'EOF'
          import os
          import glob
          from pathlib import Path
          from huggingface_hub import upload_file, create_repo, list_repo_files

          hf_repo = "${{ github.event.inputs.hf_repo || 'tapiocatakeshi/Qubit-Gemma-QBNN' }}"
          hf_token = os.getenv("HF_TOKEN")

          print(f"🎯 Target HF repo: {hf_repo}")

          # Create repo if it doesn't exist
          try:
              list_repo_files(hf_repo, repo_type="model", token=hf_token)
              print(f"✓ Repo {hf_repo} already exists")
          except Exception as e:
              print(f"Creating repo {hf_repo}...")
              try:
                  create_repo(
                      repo_id=hf_repo,
                      repo_type="model",
                      private=False,
                      token=hf_token,
                      exist_ok=True
                  )
                  print(f"✓ Repo {hf_repo} created")
              except Exception as create_err:
                  print(f"⚠ Repo creation error: {create_err}")

          # Find and upload GGUF files
          gguf_files = glob.glob("gguf_artifacts/**/*.gguf", recursive=True)
          if not gguf_files:
              gguf_files = glob.glob("**/*.gguf", recursive=True)

          print(f"\n📦 Found {len(gguf_files)} GGUF file(s)")

          for gguf_file in gguf_files:
              file_size_mb = os.path.getsize(gguf_file) / (1024 * 1024)
              print(f"\n📤 Uploading: {Path(gguf_file).name} ({file_size_mb:.2f}MB)")
              try:
                  upload_file(
                      path_or_fileobj=gguf_file,
                      path_in_repo=Path(gguf_file).name,
                      repo_id=hf_repo,
                      repo_type="model",
                      token=hf_token,
                      commit_message=f"Add {Path(gguf_file).name} from Gemma-QBNN generation"
                  )
                  print(f"✓ Successfully uploaded {Path(gguf_file).name}")
              except Exception as e:
                  print(f"✗ Failed to upload {Path(gguf_file).name}: {e}")

          # Also upload manifest.json if it exists
          manifest_files = glob.glob("gguf_artifacts/manifest.json") + glob.glob("**/manifest.json", recursive=True)
          for manifest_file in set(manifest_files):
              if os.path.exists(manifest_file):
                  print(f"\n📄 Uploading manifest: {manifest_file}")
                  try:
                      upload_file(
                          path_or_fileobj=manifest_file,
                          path_in_repo="manifest.json",
                          repo_id=hf_repo,
                          repo_type="model",
                          token=hf_token,
                          commit_message="Update manifest.json"
                      )
                      print(f"✓ Uploaded manifest.json")
                      break  # Only need to upload one manifest
                  except Exception as e:
                      print(f"⚠ Failed to upload manifest: {e}")

          print("\n✨ Upload complete!")
          EOF

      - name: 📋 Create summary
        if: success()
        run: |
          echo "## ✅ Gemma-QBNN GGUF Uploaded to HF" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository**: ${{ github.event.inputs.hf_repo || 'tapiocatakeshi/Qubit-Gemma-QBNN' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Files Uploaded**:" >> $GITHUB_STEP_SUMMARY
          ls -lh gguf_artifacts/*.gguf 2>/dev/null | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY

      - name: ❌ Failure summary
        if: failure()
        run: |
          echo "## ❌ HF Upload Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check logs above for error details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Possible issues:**" >> $GITHUB_STEP_SUMMARY
          echo "- HF_TOKEN secret not configured" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact download failed" >> $GITHUB_STEP_SUMMARY
          echo "- GGUF generation workflow did not complete successfully" >> $GITHUB_STEP_SUMMARY
