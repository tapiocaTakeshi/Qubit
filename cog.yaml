# Configuration for Cog (https://github.com/replicate/cog)
# Reference: https://cog.run/yaml/

build:
  gpu: true
  cuda: "12.4"
  python_version: "3.11"
  python_packages:
    - "torch==2.4.0"
    - "numpy>=1.24.0,<2"
    - "sentencepiece>=0.1.99,<0.3"
    - "huggingface-hub>=0.30.0,<1.0"
    - "datasets>=2.18.0,<3"
    - "accelerate>=1.1.0,<2"

predict: "predict.py:Predictor"
