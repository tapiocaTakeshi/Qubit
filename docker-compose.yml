version: '3.8'

services:
  # QBNN Frontal Engine MCP Server
  frontal-engine:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: qbnn-frontal-engine
    restart: unless-stopped

    # ボリュームマウント
    volumes:
      - .:/app
      - frontal-engine-cache:/app/.cache

    # 環境変数
    environment:
      PYTHONUNBUFFERED: '1'
      PYTHONPATH: /app
      MODEL_DIR: /app

    # ポート公開（必要に応じて）
    # ports:
    #   - "3000:3000"

    # リソース制限
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

    # ヘルスチェック
    healthcheck:
      test: ["CMD", "python", "-c", "from frontal_engine_mcp_server import judge; judge.judge({'context': 'health', 'judgment_request': 'check'})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # ログ設定
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # (オプション) Nginx リバースプロキシ
  # proxy:
  #   image: nginx:alpine
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - frontal-engine
  #   restart: unless-stopped

volumes:
  frontal-engine-cache:
    driver: local

networks:
  default:
    name: qbnn-network
